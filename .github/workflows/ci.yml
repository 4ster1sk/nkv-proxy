name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  MASTODON_INSTANCE_URL: "https://nekonoverse.org"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

# ─────────────────────────────────────────
# 1. Lint
# ─────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff

      - name: ruff check
        run: ruff check app/ tests/ --select E,F,W,I --ignore E501

# ─────────────────────────────────────────
# 2. Unit / integration tests
# ─────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (unit tests only)
        run: pytest tests/ -v --tb=short --color=yes --ignore=tests/e2e

      - name: Upload test results
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .pytest_cache/

# ─────────────────────────────────────────
# 3. Migration check
# ─────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proxy_db
          POSTGRES_USER: proxy
          POSTGRES_PASSWORD: proxy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+asyncpg://proxy:proxy@postgres:5432/proxy_db
        run: alembic upgrade head

      - name: Check for schema drift
        env:
          DATABASE_URL: postgresql+asyncpg://proxy:proxy@postgres:5432/proxy_db
        run: alembic check

      - name: Post help comment on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # コメントの内容を組み立てる
          COMMENT_BODY="⚠️ **Schema Drift Detected**
          
          モデル定義とマイグレーションの状態に差分があるようです。
          このままだと環境間で不整合が起きる可能性があります。

          お手数ですが、ローカル環境で以下を実行して
          生成されたマイグレーションファイルをコミットしてください。

          \`\`\`bash
          alembic revision --autogenerate -m 'sync schema'
          \`\`\`

          念のため内容も軽く確認しておくと安心です。"

          # GiteaのAPIを叩いてPRにコメントを投稿する
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"$COMMENT_BODY\"}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"

# ─────────────────────────────────────────
# 4. Docker build 検証（push なし・全ブランチ）
# ─────────────────────────────────────────
  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    needs: [lint, test, migration-check]
    if: github.server_url == 'https://github.com'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # キャッシュを使ってビルド（push しない）
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: misskey-mastodon-proxy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ビルドしたイメージを後続ステップで使えるようにロード
          load: true

      # ─── コンテナを起動してスモークテスト ──────────────────
      - name: Start container
        run: |
          # Start a PostgreSQL container for the proxy
          docker run -d \
            --name ci-postgres \
            -e POSTGRES_DB=proxy_db \
            -e POSTGRES_USER=proxy \
            -e POSTGRES_PASSWORD=proxy \
            postgres:18-alpine
          # Wait for postgres to be ready
          for i in $(seq 1 10); do
            sleep 2
            if docker exec ci-postgres pg_isready -U proxy 2>/dev/null; then
              echo "PostgreSQL ready"
              break
            fi
          done
          docker run -d \
            --name proxy-ci \
            -p 8000:8000 \
            --link ci-postgres:postgres \
            -e MASTODON_INSTANCE_URL=https://nekonoverse.org \
            -e DATABASE_URL=postgresql+asyncpg://proxy:proxy@postgres:5432/proxy_db \
            misskey-mastodon-proxy:ci
          # ヘルスチェックが通るまで待機（最大 60 秒）
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:8000/api/v1/streaming/health > /dev/null 2>&1; then
              echo "Container ready (attempt $i)"
              break
            fi
            echo "Waiting... (attempt $i)"
            if [ "$i" = "30" ]; then
              echo "Timeout waiting for container"
              docker logs proxy-ci
              exit 1
            fi
          done

      - name: Smoke — GET / (302 redirect to login)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/)
          [ "$STATUS" = "302" ] || [ "$STATUS" = "200" ] \
            && echo "OK: GET / returned $STATUS" \
            || (echo "FAIL: expected 302 or 200, got $STATUS" && exit 1)

      - name: Smoke — GET /api/v1/instance (requires auth → 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/instance)
          [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ] \
            && echo "OK: /api/v1/instance returned $STATUS" \
            || (echo "FAIL: expected 401 or 200, got $STATUS" && exit 1)

      - name: Smoke — GET /api/v1/streaming/health
        run: curl -sf http://localhost:8000/api/v1/streaming/health | grep -q "healthy"

      - name: Smoke — POST /api/v1/apps (app registration)
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/apps \
            -H "Content-Type: application/json" \
            -d '{"client_name":"CI","redirect_uris":"urn:ietf:wg:oauth:2.0:oob"}' \
            | grep -q "client_id"

      - name: Smoke — GET /oauth/authorize redirects to miAuth
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:8000/oauth/authorize?redirect_uri=https://example.com/cb&response_type=code&scope=read")
          [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ] \
            && echo "OK: redirect $STATUS" \
            || (echo "FAIL: expected 302/307, got $STATUS" && exit 1)

      - name: Smoke — POST /api/v1/lists (invalid token → 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/v1/lists \
            -H "Authorization: Bearer dummy" \
            -H "Content-Type: application/json" \
            -d '{"title":"test"}')
          [ "$STATUS" = "401" ] \
            && echo "OK: POST /api/v1/lists returned $STATUS" \
            || (echo "FAIL: expected 401, got $STATUS" && exit 1)

      - name: Smoke — GET /api/v1/lists (endpoint exists)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/lists \
            -H "Authorization: Bearer dummy")
          [ "$STATUS" != "404" ] \
            && echo "OK: /api/v1/lists returned $STATUS" \
            || (echo "FAIL: endpoint not found (404)" && exit 1)

      - name: Smoke — Fedibird emoji_reaction endpoint exists (PUT)
        run: |
          # 認証なしなら 401、エンドポイント自体は存在する（404 にならない）
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT http://localhost:8000/api/v1/statuses/dummy/emoji_reactions/%E2%9D%A4)
          [ "$STATUS" != "404" ] \
            && echo "OK: emoji_reaction endpoint exists ($STATUS)" \
            || (echo "FAIL: endpoint not found (404)" && exit 1)

      - name: Smoke — miAuth callback endpoint exists
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:8000/oauth/miauth-callback?session_id=00000000-0000-0000-0000-000000000000")
          # Misskey への検証リクエストは失敗するが 422 や 500 ではなく 401 が正常
          [ "$STATUS" = "401" ] \
            && echo "OK: callback endpoint reachable" \
            || (echo "NOTE: got $STATUS (may be ok if misskey unreachable)")

      - name: Container logs (always)
        if: always()
        run: docker logs proxy-ci 2>&1 | tail -40

      - name: Stop containers
        if: always()
        run: |
          docker rm -f proxy-ci || true
          docker rm -f ci-postgres || true

# ─────────────────────────────────────────
# 5. Trivy セキュリティスキャン
# ─────────────────────────────────────────
  trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    # master / develop のみ。PR では情報収集のみ（fail しない）
    if: always() && github.server_url == 'https://github.com'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: misskey-mastodon-proxy:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: misskey-mastodon-proxy:scan
          format: table
          exit-code: '0'          # スキャン結果をログに出すが CI を落とさない
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # SARIF 形式で GitHub Security タブにも表示
      - name: Run Trivy (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: misskey-mastodon-proxy:scan
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

# ─────────────────────────────────────────
# 6. Docker Build & Push to GHCR (master のみ)
# ─────────────────────────────────────────
  docker-push:
    name: Docker Push (GHCR)
    runs-on: ubuntu-latest
    needs: [docker-build, trivy]
    if: github.server_url == 'https://github.com' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────
# 7. develop ブランチへの PR サマリー通知
# ─────────────────────────────────────────
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, test, migration-check, docker-build]
    if: always() && github.event_name == 'pull_request' && github.server_url == 'https://github.com'

    steps:
      - name: Write job summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Check | ${{ needs.migration-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build + Smoke | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
